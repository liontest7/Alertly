services:
  # Next.js Web App
  - type: web
    name: alertly-web
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alertly-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true

  # Telegram Bot (Background Worker)
  - type: worker
    name: alertly-bot
    env: node
    plan: free
    buildCommand: cd telegram-bot && npm install
    startCommand: cd telegram-bot && npx ts-node src/bot.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alertly-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Set in Render Dashboard
      - key: ALERTLY_API_BASE_URL
        fromService:
          type: web
          name: alertly-web
          property: host
      - key: INTERNAL_API_KEY
        fromService:
          type: web
          name: alertly-web
          property: envVar
          envVarKey: INTERNAL_API_KEY

databases:
  - name: alertly-db
    plan: free
